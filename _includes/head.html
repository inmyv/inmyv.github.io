<head>
	<!-- 标签 -->
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
	<meta name="generator" content="Jekyll">

	<title>{%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{%if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

	<!-- CSS & fonts -->
	<link rel="stylesheet" href="{{ "/style/css/main.scss" | prepend: site.baseurl | replace: '//', '/' }}">

	<!-- RSS -->
	<link href="/pages/atom.xml" type="application/atom+xml" rel="alternate" title="ATOM Feed" />

  <!-- 站标-->
  <link rel="shortcut icon" type="image/png" href="style/img/favicon.png">

</head>
