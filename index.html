---
layout: post-index
---
{% for post in paginator.posts %}
<article>
    
    <!-- 发布精选图片 -->
    <div class="featured-image">
    <img src="{{ post.featured-image}}" style="width:100%">
    </div>

    <!-- 帖子标题 -->
    <header>
        <h1 class="entry-title">
            <a href="{{ site.url }}{{ post.url }}" rel="bookmark" title="{{ post.title }}" itemprop="url">{{ post.title }}</a>
        </h1>
        <h3 class="entry-subtitle">
            <a href="{{ site.url }}{{ post.url }}" rel="bookmark" title="{{ post.title }}" itemprop="url">{{ post.subtitle }}</a>
        </h3>
    </header>

    <!-- 发布内容 -->
<!--     <div class="entry-content">
        {{ post.content }}
    </div> -->
    
    <!--- 分界线 -->
    <hr>
    
    <!-- 张贴标签 -->
    <div class="inline-tags">
        <span>
        {% for tag in post.tags %}
            <a href="../pages/tags/#{{tag}}"><span class="fa fa-tags"></span>&nbsp;{{ tag }}&nbsp;&nbsp;&nbsp;</a>
        {% endfor %}
        </span>
    </div>
    
    <br>
    
    <!-- 发布日期 -->
    <div class="post-date">
        <span class="entry-date date published updated">
            <time datetime="{{ post.date | date_to_xmlschema }}">
                <span class="fa fa-clock-o"></span>&nbsp;
                <a href="{{ site.url }}{{ post.url }}">发布于 {{ post.date | date: "%Y年%m月%d日" }}</a>
            </time>
        </span>
    </div>
    
</article>
{% endfor %}

<div class="pagination">
<center>
{% include pagination.html %}
</center>
    </div>
