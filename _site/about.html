  <p>##关于
单色是一个最小的，响应的主题为杰基尔。单色的目标是为那些想建立博客的人提供一个即用即用的即插即用主题，并且只关注内容。</p>

<p>##特点</p>

<p>-完全响应，移动第一
-干净的搜索引擎友好的网址，自动生成的帖子标题（没有凌乱的日期在网址）
-SEO标题/描述集成
-站点地图就绪
-易于定制页眉，页脚，导航链接，颜色，favicon等
-默认单色调色板-黑色、白色、灰色</p>
