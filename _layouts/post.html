---
layout: default
---
<article id="post-page">
	<h3>{%if page.header %}{{ page.header }}{% else %}{{ page.title }}{% endif %}</h3>		
	{% for post in paginator.posts %}
		{% for tag in post.tags %}
			<a class="page-tags">{{ tag }}</a>&nbsp;
		{% endfor %}
	{% endfor %}
	<div class="content">

		{{ content }}
		
	</div>
</article>
